name: Monthly Job Scraper Pipeline

on:
  schedule:
    # This runs at 00:00 on day 1 of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # This lets you run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas beautifulsoup4

    - name: Run Scraper
      run: python scraper/scraper.py

    - name: Run ETL Pipeline
      run: python pipeline/etl.py

    - name: Run Database Loader
      run: python pipeline/loader.py

    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/ database/
        git commit -m "Automated monthly data update: $(date)" || echo "No changes to commit"
        git push